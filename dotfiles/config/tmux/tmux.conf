# remap prefix from 'C-b' to 'C-s'
unbind -n C-s
set-option -g prefix C-s
bind-key C-s send-prefix

bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

unbind -n C-h
unbind -n C-j
unbind -n C-k
unbind -n C-l
unbind -n C-e
unbind -n C-d
unbind -n C-s
unbind -n C-f

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set -s -g repeat-time 500

bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

unbind -n Tab

# Mouse support. With this off, tmux passes the scroll wheel through as arrow
# keys at the shell prompt (so scrolling cycles command history instead of the
# output). On, the wheel enters copy mode and scrolls the scrollback buffer.
set -g mouse on


# DESIGN TWEAKS

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Catppuccin Mocha palette, applied inline. Backgrounds are left as `default`
# (the terminal's own bg) so Ghostty's transparency/blur shows through — only
# foregrounds and accents are themed. Selection/copy-mode keeps a solid bg so
# the highlight stays visible.

# clock mode
setw -g clock-mode-colour '#89b4fa'        # blue

# copy mode (solid highlight, intentional)
setw -g mode-style 'fg=#1e1e2e bg=#f5c2e7 bold'   # base on pink

# pane borders
set -g pane-border-style 'fg=#45475a'             # surface1
set -g pane-active-border-style 'fg=#89b4fa'      # blue

# statusbar — transparent bg, Catppuccin accents
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=default fg=#cdd6f4'       # text on terminal bg
set -g status-left ''
set -g status-right '#[fg=#6c7086]%Y-%m-%d #[fg=#89b4fa]%H:%M '
set -g status-right-length 50
set -g status-left-length 10

setw -g window-status-current-style 'bg=default fg=#89b4fa bold'   # active = blue
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'bg=default fg=#6c7086'                # inactive = overlay0
setw -g window-status-format ' #I #[fg=#a6adc8]#W #[fg=#6c7086]#F '

setw -g window-status-bell-style 'fg=#f38ba8 bold'                 # red

# messages
set -g message-style 'bg=default fg=#f9e2af bold'                  # yellow

# Fix nvim colors
set -ga terminal-overrides ",xterm-256color:Tc"
set -g default-terminal "xterm-256color"
