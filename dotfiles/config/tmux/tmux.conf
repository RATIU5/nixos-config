# =============================================================================
# tmux configuration (source of truth)
#
# This file is sourced by home-manager's `programs.tmux` (see
# modules/shared/home-manager.nix), which appends plugin `run-shell` lines AFTER
# it. Edit here, then run `nix run .#build-switch` and reload tmux
# (prefix + r, or `tmux source-file ~/.config/tmux/tmux.conf`, or restart the
# server with `tmux kill-server`).
# =============================================================================

# remap prefix from 'C-b' to 'C-s'
unbind -n C-s
set-option -g prefix C-s
bind-key C-s send-prefix

bind R source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Remove Vim mode delays
set -g focus-events on

# Forward extended keys (kitty keyboard protocol) to apps inside tmux so
# Shift+Enter, Ctrl+Enter, etc. are distinguishable from plain Enter.
# csi-u format sends Shift+Enter as `\x1b[13;2u`; the default `xterm`
# format sends `\x1b[27;2;13~`, which Claude Code / opencode mis-handle.
set -s extended-keys always
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'

# Pane navigation. C-h/C-j/C-k/C-l (root table) is handled by the
# vim-tmux-navigator plugin, which home-manager loads after this file.
# Alt + h/j/k/l is a plugin-independent fallback.
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

# prefix + h/j/k/l also selects panes.
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Split panes. Vertical split moved to `-` so `x` can close panes.
bind-key - split-window -v
bind-key v split-window -h

# prefix + x closes (kills) the current pane, with a confirmation prompt.
# Explicitly bound (not relying on the tmux default) so a `source-file` reload
# reliably overrides any earlier `x` binding.
bind-key x confirm-before -p "kill-pane #P? (y/n)" kill-pane

unbind -n Tab

set -s -g repeat-time 600

# -----------------------------------------------------------------------------
# Resize mode
#
# Ctrl+hjkl is intentionally NOT used here: the bobrwm window manager grabs
# Ctrl+hjkl globally for window focus (see dotfiles/config/bobrwm/config.zon),
# so those chords never reach tmux.
#
# Instead: press the prefix (Ctrl+S), then `r` to enter resize mode. Then tap
# plain h/j/k/l to resize the active pane — each key re-enters the `resize` key
# table via `switch-client -T resize`, so you can keep tapping hjkl without
# re-pressing the prefix. Press Escape or q (or any unbound key) to exit.
# -----------------------------------------------------------------------------
bind-key r { switch-client -T resize ; display-message "RESIZE: hjkl to resize, Esc/q to exit" }
bind-key -T resize h { resize-pane -L 3 ; switch-client -T resize }
bind-key -T resize j { resize-pane -D 3 ; switch-client -T resize }
bind-key -T resize k { resize-pane -U 3 ; switch-client -T resize }
bind-key -T resize l { resize-pane -R 3 ; switch-client -T resize }
bind-key -T resize Escape switch-client -T root
bind-key -T resize q switch-client -T root

# sesh session manager — prefix + s opens a fuzzy popup of sessions,
# zoxide dirs, and configured projects (replaces the default session list).
bind-key s display-popup -E -w 60% -h 50% "sesh connect \"$(
  sesh list --icons | fzf --no-sort --ansi --prompt '⚡ ' \
    --header 'sesh: switch session/project'
)\""

# Mouse support. With this off, tmux passes the scroll wheel through as arrow
# keys at the shell prompt (so scrolling cycles command history instead of the
# output). On, the wheel enters copy mode and scrolls the scrollback buffer.
set -g mouse on


# DESIGN TWEAKS

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# NOTE: status bar / window-status / pane-border / message theming is owned by
# the tmux-power plugin (`@tmux_power_theme 'gold'`, configured in
# modules/shared/home-manager.nix). Do NOT set status-*/window-status-*/
# message-style/mode-style/pane-border-style here — the plugin guards against
# re-loading, so on `source-file` reload it won't re-apply, but these lines
# would, overwriting the gold theme with a blue one (the reload "flash").

# Fix nvim colors
set -ga terminal-overrides ",xterm-256color:Tc"
set -g default-terminal "xterm-256color"

# Darwin-specific fix for tmux 3.5a with sensible plugin.
# Keep this near the end so it isn't clobbered by earlier option lines.
set -g default-command "$SHELL"
